<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Performance Marketing — MBC Communications</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --navy:#0B1929;--navy2:#112240;--navy3:#1a3a5c;
    --blue:#1D6FD8;--blue-light:#3B8EF0;--blue-pale:#EBF3FF;
    --teal:#0D9488;--teal-light:#14B8A6;
    --slate:#64748B;--slate-light:#94A3B8;--slate-pale:#F1F5F9;
    --white:#FFFFFF;--border:#E2E8F0;--border-dark:#CBD5E1;
    --success:#059669;--warning:#D97706;--danger:#DC2626;
    --text:#0F172A;--text2:#334155;--text3:#64748B;
  }
  body{font-family:'Inter','Sarabun',sans-serif;background:#F0F4FA;color:var(--text);min-height:100vh}

  /* ── TOPBAR ── */
  .topbar{
    background:var(--navy);
    padding:0 32px;
    display:flex;align-items:center;gap:0;
    height:56px;position:sticky;top:0;z-index:200;
    box-shadow:0 2px 12px rgba(0,0,0,.25);
  }
  .topbar-logo{display:flex;align-items:center;gap:12px;margin-right:32px}
  .topbar-logo-mark{
    width:32px;height:32px;border-radius:8px;
    background:linear-gradient(135deg,var(--blue) 0%,var(--teal) 100%);
    display:flex;align-items:center;justify-content:center;
    font-size:14px;font-weight:800;color:#fff;letter-spacing:-.5px;
    flex-shrink:0;
  }
  .topbar-brand{display:flex;flex-direction:column;line-height:1.2}
  .topbar-brand-name{font-size:13px;font-weight:700;color:#fff;letter-spacing:.01em}
  .topbar-brand-sub{font-size:10px;color:rgba(255,255,255,.45);font-weight:400;letter-spacing:.08em;text-transform:uppercase}
  .topbar-divider{width:1px;height:28px;background:rgba(255,255,255,.12);margin:0 20px}
  .topbar-title{font-size:13px;font-weight:500;color:rgba(255,255,255,.6);letter-spacing:.02em}
  .topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
  .status-badge{display:flex;align-items:center;gap:6px;padding:5px 10px;border-radius:6px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1)}
  .status-dot{width:7px;height:7px;border-radius:50%;background:#475569;flex-shrink:0}
  .status-dot.live{background:#22C55E;box-shadow:0 0 0 3px rgba(34,197,94,.2);animation:pulse 2s infinite}
  .status-dot.error{background:#EF4444}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 3px rgba(34,197,94,.2)}50%{box-shadow:0 0 0 5px rgba(34,197,94,.1)}}
  .status-label{font-size:11px;color:rgba(255,255,255,.5);font-weight:400}
  .refresh-btn{
    padding:6px 12px;border-radius:6px;font-size:11px;font-weight:600;
    background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);
    color:rgba(255,255,255,.7);cursor:pointer;transition:all .15s;letter-spacing:.02em;
  }
  .refresh-btn:hover{background:rgba(255,255,255,.15);color:#fff;border-color:rgba(255,255,255,.3)}

  /* ── PERSON TABS ── */
  .person-tabs-wrap{background:var(--navy2);border-bottom:1px solid rgba(255,255,255,.06);padding:0 32px;display:flex;gap:0;overflow-x:auto}
  .person-tabs-wrap::-webkit-scrollbar{height:3px}.person-tabs-wrap::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px}
  .person-tab{
    padding:12px 18px;font-size:12.5px;font-weight:500;color:rgba(255,255,255,.45);
    cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;
    letter-spacing:.01em;
  }
  .person-tab:hover{color:rgba(255,255,255,.8)}
  .person-tab.active{color:#fff;border-bottom-color:var(--blue-light);font-weight:600}

  /* ── MAIN LAYOUT ── */
  .main{padding:24px 32px 48px;max-width:1280px;margin:0 auto}

  /* ── SUMMARY HEADER CARD ── */
  .person-hero{
    background:var(--white);border-radius:14px;
    border:1px solid var(--border);
    padding:20px 24px;margin-bottom:20px;
    display:flex;align-items:center;gap:32px;flex-wrap:wrap;
    box-shadow:0 1px 4px rgba(0,0,0,.04);
  }
  .person-hero-name{display:flex;flex-direction:column;gap:4px;min-width:160px}
  .person-hero-role{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--teal);margin-bottom:2px;display:flex;align-items:center;gap:6px}
  .live-dot{width:6px;height:6px;border-radius:50%;background:var(--teal);display:inline-block;animation:pulse 2s infinite}
  .person-hero-title{font-size:20px;font-weight:700;color:var(--text);letter-spacing:-.3px}
  .hero-divider{width:1px;height:44px;background:var(--border);flex-shrink:0}
  .hero-stat{display:flex;flex-direction:column;gap:3px;min-width:70px}
  .hero-stat-label{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3)}
  .hero-stat-value{font-size:24px;font-weight:800;letter-spacing:-.5px;line-height:1}
  .hero-stat-value.blue{color:var(--blue)}
  .hero-stat-value.dark{color:var(--text2)}
  .hero-stat-value.green{color:var(--success)}
  .hero-stat-value.orange{color:var(--warning)}
  .hero-progress{flex:1;min-width:200px;display:flex;flex-direction:column;gap:6px}
  .hero-progress-label{display:flex;justify-content:space-between;align-items:center}
  .hero-progress-text{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.04em;text-transform:uppercase}
  .hero-progress-pct{font-size:14px;font-weight:800;letter-spacing:-.3px}
  .progress-track{height:10px;background:var(--slate-pale);border-radius:5px;overflow:hidden}
  .progress-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--blue),var(--teal));transition:width .6s cubic-bezier(.4,0,.2,1)}

  /* ── SECTION LABEL ── */
  .section-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:12px;display:flex;align-items:center;gap:8px}
  .section-label::after{content:'';flex:1;height:1px;background:var(--border)}

  /* ── BRAND GRID ── */
  .brand-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px}
  .brand-card{
    background:var(--white);border-radius:12px;padding:18px 20px;
    border:1px solid var(--border);box-shadow:0 1px 3px rgba(0,0,0,.04);
    transition:box-shadow .2s;
  }
  .brand-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.08)}
  .brand-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
  .brand-badge{font-size:10px;font-weight:700;padding:4px 10px;border-radius:20px;letter-spacing:.06em}
  .badge-aukey{background:#DBEAFE;color:#1D4ED8}
  .badge-earfun{background:#EDE9FE;color:#5B21B6}
  .badge-mokin{background:#D1FAE5;color:#065F46}
  .brand-nums{text-align:right}
  .brand-actual{font-size:26px;font-weight:800;letter-spacing:-.5px;line-height:1}
  .brand-target{font-size:11px;color:var(--slate-light);margin-top:2px}
  .big-bar-bg{height:6px;background:var(--slate-pale);border-radius:3px;overflow:hidden;margin-bottom:14px}
  .big-bar{height:100%;border-radius:3px;transition:width .5s}
  .plat-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .plat-label{font-size:10px;font-weight:600;width:64px;flex-shrink:0;letter-spacing:.03em}
  .plat-bar-bg{flex:1;height:4px;background:var(--slate-pale);border-radius:2px;overflow:hidden}
  .plat-bar{height:100%;border-radius:2px}
  .plat-count{font-size:10px;color:var(--slate-light);min-width:40px;text-align:right}

  /* ── PLATFORM COLORS ── */
  .shopee-color{color:#E85D04}.lazada-color{color:#7C3AED}.tiktok-color{color:#0D9488}
  .facebook-color{color:#1877F2}.instagram-color{color:#E1306C}.offline-color{color:#64748B}
  .mainjob-color{color:#0F172A}.google-color{color:#EA4335}.line-color{color:#06C755}
  .lemon8-color{color:#FF6200}.live-color{color:#EF4444}.x-color{color:#0F172A}
  .website-color{color:#0369A1}.youtube-color{color:#FF0000}
  .shopee-bar{background:#E85D04}.lazada-bar{background:#7C3AED}.tiktok-bar{background:#0D9488}
  .facebook-bar{background:#1877F2}.instagram-bar{background:#E1306C}.offline-bar{background:#94A3B8}
  .mainjob-bar{background:#334155}.google-bar{background:#EA4335}.line-bar{background:#06C755}
  .lemon8-bar{background:#FF6200}.live-bar{background:#EF4444}.x-bar{background:#334155}
  .website-bar{background:#0369A1}.youtube-bar{background:#FF0000}
  .pill-shopee{background:#FFF1E6;color:#C4500A}.pill-lazada{background:#F5F3FF;color:#5B21B6}
  .pill-tiktok{background:#CCFBF1;color:#0F766E}.pill-facebook{background:#EFF6FF;color:#1D4ED8}
  .pill-instagram{background:#FDF2F8;color:#9D174D}.pill-offline{background:#F1F5F9;color:#475569}
  .pill-mainjob{background:#F8FAFC;color:#334155}.pill-google{background:#FEF2F2;color:#B91C1C}
  .pill-line{background:#DCFCE7;color:#15803D}.pill-lemon8{background:#FFF4EE;color:#C44A00}
  .pill-live{background:#FFF0F0;color:#B91C1C}.pill-x{background:#F8FAFC;color:#0F172A}
  .pill-website{background:#E0F2FE;color:#0369A1}.pill-youtube{background:#FFF0F0;color:#CC0000}

  /* ── STATUS PILLS ── */
  .status-completed{background:#DCFCE7;color:#166534;font-weight:600;padding:3px 10px;border-radius:6px;font-size:11px;display:inline-flex;align-items:center;gap:4px}
  .status-cancelled{background:#FEE2E2;color:#991B1B;font-weight:600;padding:3px 10px;border-radius:6px;font-size:11px;display:inline-flex;align-items:center;gap:4px}
  .status-editing{background:#FEF9C3;color:#854D0E;font-weight:600;padding:3px 10px;border-radius:6px;font-size:11px;display:inline-flex;align-items:center;gap:4px}
  .status-processing{background:#FED7AA;color:#9A3412;font-weight:600;padding:3px 10px;border-radius:6px;font-size:11px;display:inline-flex;align-items:center;gap:4px}
  .status-other{background:#F1F5F9;color:#475569;font-weight:500;padding:3px 10px;border-radius:6px;font-size:11px;display:inline-block}

  /* ── FILTERS ── */
  .filters-wrap{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:10px}
  .filter-group{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .filter-sep{width:1px;height:18px;background:var(--border);margin:0 4px}
  .f-btn{
    padding:5px 12px;border-radius:6px;border:1px solid var(--border);
    background:var(--white);color:var(--slate);cursor:pointer;font-size:11.5px;font-weight:500;
    transition:all .15s;letter-spacing:.01em;
  }
  .f-btn:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-pale)}
  .f-btn.active{background:var(--blue);border-color:var(--blue);color:#fff;font-weight:600}
  .f-btn-brand{
    padding:5px 12px;border-radius:6px;border:1px solid var(--border);
    background:var(--white);color:var(--slate);cursor:pointer;font-size:11.5px;font-weight:500;
    transition:all .15s;
  }
  .f-btn-brand:hover{border-color:var(--navy);color:var(--navy)}
  .f-btn-brand.active{background:var(--navy);border-color:var(--navy);color:#fff;font-weight:600}

  /* ── TABLE ── */
  .table-wrap{background:var(--white);border-radius:12px;border:1px solid var(--border);overflow:auto;box-shadow:0 1px 4px rgba(0,0,0,.04)}
  table{width:100%;border-collapse:collapse;font-size:12.5px}
  thead th{
    background:#F8FAFC;padding:10px 14px;text-align:left;
    font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.07em;
    color:var(--text3);border-bottom:1px solid var(--border);white-space:nowrap;
  }
  tbody td{padding:11px 14px;border-bottom:1px solid #F8FAFC;vertical-align:middle}
  tbody tr:last-child td{border-bottom:none}
  tbody tr:hover td{background:#FAFBFF}
  .brand-pill{font-size:10px;font-weight:700;padding:3px 9px;border-radius:6px;display:inline-block;letter-spacing:.04em}
  .plat-pill{font-size:10px;font-weight:600;padding:2px 8px;border-radius:5px;display:inline-block;margin:1px 2px 1px 0}
  .num-job{text-align:center;font-weight:700;font-size:15px}
  .no-data{text-align:center;padding:48px;color:var(--slate-light);font-size:13px}

  /* ── TEAM OVERVIEW TABLE ── */
  .team-table-wrap{background:var(--white);border-radius:12px;border:1px solid var(--border);overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.04);margin-bottom:24px}
  .team-table{width:100%;border-collapse:collapse;font-size:13px}
  .team-table thead th{background:#F8FAFC;padding:10px 16px;font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);border-bottom:1px solid var(--border);text-align:left}
  .team-table tbody td{padding:13px 16px;border-bottom:1px solid #F8FAFC;vertical-align:middle}
  .team-table tbody tr:last-child td{border-bottom:none}
  .team-table tbody tr:hover td{background:#FAFBFF}

  /* ── LOADING & TOAST ── */
  .loading-overlay{position:fixed;inset:0;background:rgba(11,25,41,.6);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:14px;backdrop-filter:blur(2px)}
  .spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,.15);border-top-color:var(--blue-light);border-radius:50%;animation:spin .7s linear infinite}
  .loading-text{font-size:13px;color:rgba(255,255,255,.7);font-weight:500}
  @keyframes spin{to{transform:rotate(360deg)}}
  .toast{position:fixed;bottom:24px;right:24px;background:var(--navy);color:#fff;padding:11px 18px;border-radius:8px;font-size:12.5px;opacity:0;transition:opacity .3s;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.1)}
  .toast.show{opacity:1}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">
    <div class="topbar-logo-mark">M</div>
    <div class="topbar-brand">
      <div class="topbar-brand-name">MBC Communications</div>
      <div class="topbar-brand-sub">Marketing</div>
    </div>
  </div>
  <div class="topbar-divider"></div>
  <div class="topbar-title">Key Performance Indicator - Marketing</div>
  <div class="topbar-right">
    <div class="status-badge">
      <span class="status-dot" id="statusDot"></span>
      <span class="status-label" id="statusLabel">กำลังโหลด...</span>
    </div>
    <button class="refresh-btn" onclick="fetchData()">↻ รีเฟรช</button>
  </div>
</div>

<div class="person-tabs-wrap" id="personTabs"></div>

<div class="main">
  <div id="mainSection"></div>
  <div id="summaryBar"></div>
  <div id="brandGridWrap">
    <div class="section-label">ภาพรวมรายแบรนด์</div>
    <div class="brand-grid" id="brandGrid"></div>
  </div>
  <div id="tableWrap">
    <div class="filters-wrap">
      <div class="section-label" style="margin:0;flex:none">รายการงานทั้งหมด</div>
      <div class="filter-group">
        <div id="monthFilterRow" style="display:flex;gap:6px;flex-wrap:wrap">
          <button class="f-btn active" onclick="filterMonth(this,'ALL')">ทุกเดือน</button>
        </div>
        <div class="filter-sep"></div>
        <button class="f-btn-brand active" onclick="filterBrand(this,'ALL')">ทุกแบรนด์</button>
        <button class="f-btn-brand" onclick="filterBrand(this,'AUKEY')">AUKEY</button>
        <button class="f-btn-brand" onclick="filterBrand(this,'EARFUN')">EARFUN</button>
        <button class="f-btn-brand" onclick="filterBrand(this,'MOKIN')">MOKIN</button>

      </div>

      <table>
        <thead><tr>
          <th>#</th><th>แบรนด์</th><th>Platform</th><th>Job Responsibilities</th>
          <th style="text-align:center">จำนวนงาน</th><th>Deadline</th><th>Actual Completion</th><th>Link</th><th>Status</th>

        <tbody id="jobBody"></tbody>
      </table>

</div>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text">กำลังดึงข้อมูลจาก Google Sheets...</div>
</div>

<script>
const SHEET_ID = '1gMWQ4EIyDX04dA6TwFwvvwqFN3gSD4hsh_oEVDjWjx8';
const SHEETS = [
  { name: 'Digital Marketing', gid: '982780150',   colOffset: 0  },
  { name: 'Content - Xii',     gid: '1991867364',  colOffset: 0  },
  { name: 'Editor - Rock',     gid: '837970031',   colOffset: 0  },
  { name: 'Graphic - Pipe',    gid: '1861048863',  colOffset: 0  },
  { name: 'Graphic - Jo',      gid: '968852649',   colOffset: 0  },
  { name: 'Influencer - Ant',  gid: '1404465384',  colOffset: 0  },
  { name: 'Editor - Peet',     gid: '1267377490',  colOffset: 0  },
];

const BRANDS = ['AUKEY','EARFUN','MOKIN'];
const BRAND_TARGET = {AUKEY:31, EARFUN:17, MOKIN:4};
const BRAND_COLOR = {AUKEY:'#1d4ed8', EARFUN:'#7c3aed', MOKIN:'#059669'};
const BRAND_BADGE = {AUKEY:'badge-aukey', EARFUN:'badge-earfun', MOKIN:'badge-mokin'};
const PLAT_BAR = {SHOPEE:'shopee-bar', LAZADA:'lazada-bar', TIKTOK:'tiktok-bar', FACEBOOK:'facebook-bar', INSTAGRAM:'instagram-bar', OFFLINE:'offline-bar', MAINJOB:'mainjob-bar', GOOGLE:'google-bar', LINE:'line-bar', LEMON8:'lemon8-bar', LIVE:'live-bar', X:'x-bar', WEBSITE:'website-bar', YOUTUBE:'youtube-bar'};
const PLAT_PILL = {SHOPEE:'pill-shopee', LAZADA:'pill-lazada', TIKTOK:'pill-tiktok', FACEBOOK:'pill-facebook', INSTAGRAM:'pill-instagram', OFFLINE:'pill-offline', MAINJOB:'pill-mainjob', GOOGLE:'pill-google', LINE:'pill-line', LEMON8:'pill-lemon8', LIVE:'pill-live', X:'pill-x', WEBSITE:'pill-website', YOUTUBE:'pill-youtube'};
const PLAT_COLOR_CLASS = {SHOPEE:'shopee-color', LAZADA:'lazada-color', TIKTOK:'tiktok-color', FACEBOOK:'facebook-color', INSTAGRAM:'instagram-color', OFFLINE:'offline-color', MAINJOB:'mainjob-color', GOOGLE:'google-color', LINE:'line-color', LEMON8:'lemon8-color', LIVE:'live-color', X:'x-color', WEBSITE:'website-color', YOUTUBE:'youtube-color'};
// Map raw platform text from sheet to internal key
const PLAT_ALIASES = {
  'MAIN JOB': 'MAINJOB', 'MAINJOB': 'MAINJOB',
  'LEMON 8': 'LEMON8', 'LEMON8': 'LEMON8',
  'SHOPEE': 'SHOPEE', 'LAZADA': 'LAZADA', 'TIKTOK': 'TIKTOK',
  'FACEBOOK': 'FACEBOOK', 'FB': 'FACEBOOK',
  'INSTAGRAM': 'INSTAGRAM', 'IG': 'INSTAGRAM',
  'LINE': 'LINE', 'GOOGLE': 'GOOGLE',
  'YOUTUBE': 'YOUTUBE', 'YT': 'YOUTUBE',
  'LIVE': 'LIVE', 'X': 'X', 'TWITTER': 'X',
  'WEBSITE': 'WEBSITE', 'WEB': 'WEBSITE',
  'OFFLINE': 'OFFLINE',
};

function parsePlatforms(raw) {
  if (!raw) return [];
  const u = raw.trim().toUpperCase();
  // Try whole string match first (single platform per cell)
  if (PLAT_ALIASES[u]) return [PLAT_ALIASES[u]];
  // Multi-platform: split by comma, slash, newline only
  const parts = raw.split(/[,\/\n\r]+/).map(p => p.trim()).filter(Boolean);
  if (parts.length > 1) {
    return [...new Set(parts.map(p => PLAT_ALIASES[p.toUpperCase()] || PLAT_ALIASES[p.toUpperCase().replace(/\s+/g,'')] || null).filter(Boolean))];
  }
  // Single token fallback: strip all spaces and try
  const stripped = u.replace(/\s+/g, '');
  if (PLAT_ALIASES[stripped]) return [PLAT_ALIASES[stripped]];
  return [];
}

const MONTHS = ['April','May','June','July','August','September','October','November','December'];

// โครงสร้างจริง: แต่ละชุดมี 8 คอลัมน์ + 1 ว่าง = 9 คอลัมน์/ชุด
// 3 ชุดต่อเดือน = 27 คอลัมน์/เดือน
// AUKEY-APRIL=A(0), EARFUN-APRIL=J(9), MOKIN-APRIL=S(18)
// AUKEY-MAY=AB(27), EARFUN-MAY=AK(36), MOKIN-MAY=AT(45)
// คอลัมน์: Brand(0), Platform(1), Job(2), Deadline(3), Actual(4), NumJob(5), Link(6), Status(7)
function getColSets(monthIndex, colOffset) {
  const base = (colOffset || 0) + monthIndex * 27;
  return [

function serialToDate(v) {
  if (!v || v === '') return null;
  const s = String(v).trim();
  // D/M/YYYY หรือ DD/MM/YYYY (วัน/เดือน/ปี แบบไทย)
  if (s.match(/^\d{1,2}\/\d{1,2}\/\d{4}$/)) {
    const parts = s.split('/');
    const d = parts[0].padStart(2,'0');
    const m = parts[1].padStart(2,'0');
    const y = parts[2];
    return `${y}-${m}-${d}`;
  }
  // yyyy-mm-dd
  if (s.match(/^\d{4}-\d{2}-\d{2}$/)) return s;
  // Excel serial number
  if (!isNaN(s) && Number(s) > 0) {
    const dt = new Date(Date.UTC(1899,11,30) + Number(s) * 86400000);
    return dt.toISOString().slice(0,10);
  }
  return null;
}

function fmtDate(v) {
  if (!v || v === '-') return '-';
  const s = serialToDate(v);
  if (!s) return '-';
  const [y, m, d] = s.split('-');
  if (!y || !m || !d || isNaN(y) || isNaN(m) || isNaN(d)) return '-';
  const months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  return `${parseInt(d)} ${months[parseInt(m)-1]} ${parseInt(y)-543}`;
}

function fmtDate(v) {
  if (!v || v === '-') return '-';
  const s = serialToDate(v);
  if (!s) return '-';
  const [y,m,d] = s.split('-');
  const months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  return `${parseInt(d)} ${months[parseInt(m)-1]} ${parseInt(y)-1957}`;
}

function isDone(status) {
  if (!status) return false;
  const s = String(status).trim().toLowerCase();
  return s === '✔' || s === 'done' || s === 'true' || s === 'completed' || s === 'complete';
}

function statusPill(status) {
  const s = String(status || '').trim();
  const sl = s.toLowerCase();
  if (!s) return '<span class="status-other">-</span>';
  if (sl === 'completed' || sl === 'complete' || sl === '✔' || sl === 'done' || sl === 'true') return `<span class="status-completed">✔ Completed</span>`;
  if (sl === 'cancelled' || sl === 'canceled') return `<span class="status-cancelled">✖ Cancelled</span>`;
  if (sl === 'editing') return `<span class="status-editing">✏ Editing</span>`;
  if (sl === 'processing') return `<span class="status-processing">⏳ Processing</span>`;
  return `<span class="status-other">${s}</span>`;
}

// ดึงข้อมูลผ่าน Google Sheets CSV export (ไม่ต้องใช้ API key)
async function fetchSheet(gid) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${gid}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const text = await res.text();
  return parseCSV(text);
}

function parseCSV(text) {
  const rows = [];
  let row = [], cell = '', inQ = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (c === '"') {
      if (inQ && text[i+1] === '"') { cell += '"'; i++; } // escaped quote
      else { inQ = !inQ; }
    } else if (c === ',' && !inQ) {
      row.push(cell.trim()); cell = '';
    } else if ((c === '\n' || (c === '\r' && text[i+1] === '\n')) && !inQ) {
      if (c === '\r') i++; // skip \r in \r\n
      row.push(cell.trim()); cell = '';
      rows.push(row); row = [];
    } else {
      cell += c;
    }
  }
  if (cell || row.length) { row.push(cell.trim()); rows.push(row); }
  return rows;
}

async function fetchPersonData(personIndex) {
  const sheet = SHEETS[personIndex];
  if (!sheet) return;

  document.getElementById('loadingOverlay').style.display = 'flex';
  document.getElementById('statusDot').className = 'status-dot';
  document.getElementById('statusLabel').textContent = 'กำลังโหลด ' + sheet.name + '...';

  try {
    const rows = await fetchSheet(sheet.gid);
    const jobs = [];
    const monthlyTargets = {};

    for (let mi = 0; mi < MONTHS.length; mi++) {
      const colSets = getColSets(mi, sheet.colOffset || 0);
      const targetCol = (sheet.colOffset || 0) + mi * 27 + 1;
      const targetVal = Number((rows[5] || [])[targetCol] || 0);
      monthlyTargets[MONTHS[mi]] = targetVal;

      colSets.forEach((c, ci) => {
        // First pass: collect all rows for this colSet
        const rawJobs = [];
        let lastBrand = '';
        for (let r = 9; r < rows.length; r++) {
          const row = rows[r];
          const brand = String(row[c.brandCol] || '').trim() || lastBrand;
          if (!brand) continue;
          if (['BRAND','PLATFORM','JOB RESPONSIBILITIES','JOB','TARGET','ACTUAL'].includes(brand.toUpperCase())) continue;
          if (!['AUKEY','EARFUN','MOKIN'].includes(brand.toUpperCase())) continue;
          if (String(row[c.brandCol] || '').trim()) lastBrand = brand; // update only when explicitly set
          const rawPlat = String(row[c.platCol] || '').trim();
          const job = String(row[c.jobCol] || '').trim();
          const dlVal = row[c.dlCol]; const actVal = row[c.actCol];
          const numJob = Number(row[c.numCol] || 0);
          const linkRaw = String(row[c.linkCol] || '').trim();
          const links = linkRaw.split(/\n+/).map(l => l.trim()).filter(l => l.startsWith('http'));
          const link = links[0] || '';
          const status = String(row[c.statusCol] || '').trim();
          if (!rawPlat && !job && !links.length && !status) continue;
          rawJobs.push({ brand, rawPlat, job, dlVal, actVal, numJob, links, status });
        }

        // Status priority order
        const statusPriority = s => {
          const sl = (s||'').toLowerCase();
          if (sl === 'completed' || sl === 'complete' || sl === '✔') return 4;
          if (sl === 'processing') return 3;
          if (sl === 'editing') return 2;
          if (sl === 'cancelled' || sl === 'canceled') return 1;
          return 0;
        };

        // Second pass: group consecutive platform-only rows into the last job row
        const grouped = [];
        let current = null;
        for (const r of rawJobs) {
          if (r.job) {
            current = {
              brand: r.brand,
              platforms: parsePlatforms(r.rawPlat),
              job: r.job,
              deadline: serialToDate(r.dlVal),
              actual: serialToDate(r.actVal),
              numJob: r.numJob,
              links: [...(r.links||[])],
              status: r.status,
            };
            grouped.push(current);
          } else if (current) {
            if (r.rawPlat) {
              parsePlatforms(r.rawPlat).forEach(p => {
                if (!current.platforms.includes(p)) current.platforms.push(p);
              });
            }
            (r.links||[]).forEach(l => { if (!current.links.includes(l)) current.links.push(l); });
            if (statusPriority(r.status) > statusPriority(current.status)) current.status = r.status;
            if (!current.numJob && r.numJob) current.numJob = r.numJob;
            if (!current.deadline && r.dlVal) current.deadline = serialToDate(r.dlVal);
            if (!current.actual && r.actVal) current.actual = serialToDate(r.actVal);
          }
        }

        grouped.forEach(j => jobs.push({ month: MONTHS[mi], brand: j.brand, platforms: j.platforms, job: j.job, deadline: j.deadline, actual: j.actual, numJob: j.numJob, links: j.links, status: j.status }));
      });
    }

    liveData[sheet.name] = { jobs, monthlyTargets };
    document.getElementById('statusDot').className = 'status-dot live';
    document.getElementById('statusLabel').textContent = 'Live — ' + new Date().toLocaleTimeString('th-TH');
    toast('โหลด ' + sheet.name + ' สำเร็จ ✓');
  } catch(e) {
    document.getElementById('statusDot').className = 'status-dot error';
    document.getElementById('statusLabel').textContent = 'เชื่อมต่อไม่ได้';
    toast('เชื่อมต่อไม่ได้: ' + e.message, 'err');
  } finally {
    document.getElementById('loadingOverlay').style.display = 'none';
    renderAll();
  }
}

// Links popup
let _popupJobs = [];
function showLinks(idx) {
  const j = _popupJobs[idx];
  if (!j) return;
  const links = j.links && j.links.length ? j.links : (j.link ? [j.link] : []);
  const modal = document.getElementById('linksModal');
  document.getElementById('linksModalTitle').textContent = j.job || 'ลิ้งค์งาน';
  document.getElementById('linksModalBody').innerHTML = links.map((url, i) => {
    const domain = (() => { try { return new URL(url).hostname.replace('www.',''); } catch(e) { return url; } })();
    const icon = domain.includes('tiktok') ? '🎵' : domain.includes('facebook') ? '📘' : domain.includes('instagram') ? '📸' : domain.includes('youtube') || domain.includes('youtu.be') ? '▶️' : domain.includes('lemon8') ? '🍋' : domain.includes('x.com') || domain.includes('twitter') ? '✖️' : domain.includes('sharepoint') || domain.includes('drive.google') || domain.includes('docs.google') ? '📁' : '🔗';
    return `<a href="${url}" target="_blank" style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;background:#f8fafc;border:1px solid #e2e8f0;text-decoration:none;color:#1e293b;font-size:13px;margin-bottom:8px;transition:background .15s" onmouseover="this.style.background='#eff6ff'" onmouseout="this.style.background='#f8fafc'">
      <span style="font-size:18px">${icon}</span>
      <div style="overflow:hidden">
        <div style="font-weight:600;color:#185FA5">${domain}</div>
        <div style="font-size:11px;color:#94a3b8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:320px">${url}</div>
      </div>
      <span style="margin-left:auto;color:#94a3b8;font-size:18px">↗</span>
    </a>`;
  }).join('');
  modal.style.display = 'flex';
}

function renderAll() {
  renderTabs();
  document.getElementById('mainSection').innerHTML = '';
  document.getElementById('summaryBar').style.display = 'flex';
  document.getElementById('brandGridWrap').style.display = 'block';
  document.getElementById('tableWrap').style.display = 'block';
  renderSummary();
  renderBrandGrid();
  renderTable();
}
