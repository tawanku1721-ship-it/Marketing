<script>
const SHEET_ID = '1gMWQ4EIyDX04dA6TwFwvvwqFN3gSD4hsh_oEVDjWjx8';
const SHEETS = [
  { name: 'Digital Marketing', gid: '982780150' },
  { name: 'Content - Xii',     gid: '1991867364' },
  { name: 'Editor - Rock',     gid: '837970031' },
  { name: 'Graphic - Pipe',    gid: '1861048863' },
  { name: 'Graphic - Jo',      gid: '968852649' },
  { name: 'Influencer - Ant',  gid: '1404465384' },
  { name: 'Editor - Peet',     gid: '1267377490' },
];

const BRANDS = ['AUKEY','EARFUN','MOKIN'];
const BRAND_TARGET = {AUKEY:31, EARFUN:17, MOKIN:4};
const BRAND_COLOR = {AUKEY:'#1d4ed8', EARFUN:'#7c3aed', MOKIN:'#059669'};
const BRAND_BADGE = {AUKEY:'badge-aukey', EARFUN:'badge-earfun', MOKIN:'badge-mokin'};
const PLAT_BAR = {SHOPEE:'shopee-bar', LAZADA:'lazada-bar', TIKTOK:'tiktok-bar', FACEBOOK:'facebook-bar', INSTAGRAM:'instagram-bar', OFFLINE:'offline-bar', MAINJOB:'mainjob-bar', GOOGLE:'google-bar', LINE:'line-bar', LEMON8:'lemon8-bar', LIVE:'live-bar', X:'x-bar', WEBSITE:'website-bar', YOUTUBE:'youtube-bar'};
const PLAT_PILL = {SHOPEE:'pill-shopee', LAZADA:'pill-lazada', TIKTOK:'pill-tiktok', FACEBOOK:'pill-facebook', INSTAGRAM:'pill-instagram', OFFLINE:'pill-offline', MAINJOB:'pill-mainjob', GOOGLE:'pill-google', LINE:'pill-line', LEMON8:'pill-lemon8', LIVE:'pill-live', X:'pill-x', WEBSITE:'pill-website', YOUTUBE:'pill-youtube'};
const PLAT_COLOR_CLASS = {SHOPEE:'shopee-color', LAZADA:'lazada-color', TIKTOK:'tiktok-color', FACEBOOK:'facebook-color', INSTAGRAM:'instagram-color', OFFLINE:'offline-color', MAINJOB:'mainjob-color', GOOGLE:'google-color', LINE:'line-color', LEMON8:'lemon8-color', LIVE:'live-color', X:'x-color', WEBSITE:'website-color', YOUTUBE:'youtube-color'};
// Map raw platform text from sheet to internal key
const PLAT_ALIASES = {
  'MAIN JOB': 'MAINJOB', 'MAINJOB': 'MAINJOB',
  'LEMON 8': 'LEMON8', 'LEMON8': 'LEMON8',
  'SHOPEE': 'SHOPEE', 'LAZADA': 'LAZADA', 'TIKTOK': 'TIKTOK',
  'FACEBOOK': 'FACEBOOK', 'FB': 'FACEBOOK',
  'INSTAGRAM': 'INSTAGRAM', 'IG': 'INSTAGRAM',
  'LINE': 'LINE', 'GOOGLE': 'GOOGLE',
  'YOUTUBE': 'YOUTUBE', 'YT': 'YOUTUBE',
  'LIVE': 'LIVE', 'X': 'X', 'TWITTER': 'X',
  'WEBSITE': 'WEBSITE', 'WEB': 'WEBSITE',
  'OFFLINE': 'OFFLINE',
};

function parsePlatforms(raw) {
  if (!raw) return [];
  const u = raw.trim().toUpperCase();
  // Try whole string match first (single platform per cell)
  if (PLAT_ALIASES[u]) return [PLAT_ALIASES[u]];
  // Multi-platform: split by comma, slash, newline only
  const parts = raw.split(/[,\/\n\r]+/).map(p => p.trim()).filter(Boolean);
  if (parts.length > 1) {
    return [...new Set(parts.map(p => PLAT_ALIASES[p.toUpperCase()] || PLAT_ALIASES[p.toUpperCase().replace(/\s+/g,'')] || null).filter(Boolean))];
  }
  // Single token fallback: strip all spaces and try
  const stripped = u.replace(/\s+/g, '');
  if (PLAT_ALIASES[stripped]) return [PLAT_ALIASES[stripped]];
  return [];
}

const MONTHS = ['April','May','June','July','August','September','October','November','December'];

// โครงสร้างจริง: แต่ละชุดมี 8 คอลัมน์ + 1 ว่าง = 9 คอลัมน์/ชุด
// 3 ชุดต่อเดือน = 27 คอลัมน์/เดือน
// AUKEY-APRIL=A(0), EARFUN-APRIL=J(9), MOKIN-APRIL=S(18)
// AUKEY-MAY=AB(27), EARFUN-MAY=AK(36), MOKIN-MAY=AT(45)
// คอลัมน์: Brand(0), Platform(1), Job(2), Deadline(3), Actual(4), NumJob(5), Link(6), Status(7)
function getColSets(monthIndex) {
  const base = monthIndex * 27;
  return [
    { brandCol:base+0,  platCol:base+1,  jobCol:base+2,  dlCol:base+3,  actCol:base+4,  numCol:base+5,  linkCol:base+6,  statusCol:base+7  },
    { brandCol:base+9,  platCol:base+10, jobCol:base+11, dlCol:base+12, actCol:base+13, numCol:base+14, linkCol:base+15, statusCol:base+16 },
    { brandCol:base+18, platCol:base+19, jobCol:base+20, dlCol:base+21, actCol:base+22, numCol:base+23, linkCol:base+24, statusCol:base+25 },
  ];
}

let liveData = {};
let currentPerson = 0;
let currentPlat = 'ALL';
let currentMonth = 'ALL';
let currentBrand = 'ALL';
let autoRefreshTimer = null;

function serialToDate(v) {
  if (!v || v === '') return null;
  const s = String(v).trim();
  // D/M/YYYY หรือ DD/MM/YYYY (วัน/เดือน/ปี แบบไทย)
  if (s.match(/^\d{1,2}\/\d{1,2}\/\d{4}$/)) {
    const parts = s.split('/');
    const d = parts[0].padStart(2,'0');
    const m = parts[1].padStart(2,'0');
    const y = parts[2];
    return `${y}-${m}-${d}`;
  }
  // yyyy-mm-dd
  if (s.match(/^\d{4}-\d{2}-\d{2}$/)) return s;
  // Excel serial number
  if (!isNaN(s) && Number(s) > 0) {
    const dt = new Date(Date.UTC(1899,11,30) + Number(s) * 86400000);
    return dt.toISOString().slice(0,10);
  }
  return null;
}

function fmtDate(v) {
  if (!v || v === '-') return '-';
  const s = serialToDate(v);
  if (!s) return '-';
  const [y, m, d] = s.split('-');
  if (!y || !m || !d || isNaN(y) || isNaN(m) || isNaN(d)) return '-';
  const months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  return `${parseInt(d)} ${months[parseInt(m)-1]} ${parseInt(y)-543}`;
}

function fmtDate(v) {
  if (!v || v === '-') return '-';
  const s = serialToDate(v);
  if (!s) return '-';
  const [y,m,d] = s.split('-');
  const months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  return `${parseInt(d)} ${months[parseInt(m)-1]} ${parseInt(y)-1957}`;
}

function toast(msg, type='ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = type === 'err' ? '#dc2626' : '#1e293b';
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

function isDone(status) {
  if (!status) return false;
  const s = String(status).trim().toLowerCase();
  return s === '✔' || s === 'done' || s === 'true' || s === 'completed' || s === 'complete';
}

function statusPill(status) {
  const s = String(status || '').trim();
  const sl = s.toLowerCase();
  if (!s) return '<span class="status-other">-</span>';
  if (sl === 'completed' || sl === 'complete' || sl === '✔' || sl === 'done' || sl === 'true') return `<span class="status-completed">✔ Completed</span>`;
  if (sl === 'cancelled' || sl === 'canceled') return `<span class="status-cancelled">✖ Cancelled</span>`;
  if (sl === 'editing') return `<span class="status-editing">✏ Editing</span>`;
  if (sl === 'processing') return `<span class="status-processing">⏳ Processing</span>`;
  return `<span class="status-other">${s}</span>`;
}

// ดึงข้อมูลผ่าน Google Sheets CSV export (ไม่ต้องใช้ API key)
async function fetchSheet(gid) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${gid}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const text = await res.text();
  return parseCSV(text);
}

function parseCSV(text) {
  const rows = [];
  const lines = text.split('\n');
  for (const line of lines) {
    const row = [];
    let inQ = false, cell = '';
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { row.push(cell.trim()); cell = ''; }
      else { cell += c; }
    }
    row.push(cell.trim());
    rows.push(row);
  }
  return rows;
}

async function fetchPersonData(personIndex) {
  const sheet = SHEETS[personIndex];
  if (!sheet) return;

  document.getElementById('loadingOverlay').style.display = 'flex';
  document.getElementById('statusDot').className = 'status-dot';
  document.getElementById('statusLabel').textContent = 'กำลังโหลด ' + sheet.name + '...';

  try {
    const rows = await fetchSheet(sheet.gid);
    const jobs = [];
    const monthlyTargets = {};

    for (let mi = 0; mi < MONTHS.length; mi++) {
      const colSets = getColSets(mi);
      const targetCol = mi * 27 + 1;
      const targetVal = Number((rows[5] || [])[targetCol] || 0);
      monthlyTargets[MONTHS[mi]] = targetVal;

      colSets.forEach((c, ci) => {
        // First pass: collect all rows for this colSet
        const rawJobs = [];
        let lastBrand = '';
        for (let r = 9; r < rows.length; r++) {
          const row = rows[r];
          const brand = String(row[c.brandCol] || '').trim() || lastBrand;
          if (!brand) continue;
          if (['BRAND','PLATFORM','JOB RESPONSIBILITIES','JOB','TARGET','ACTUAL'].includes(brand.toUpperCase())) continue;
          if (!['AUKEY','EARFUN','MOKIN'].includes(brand.toUpperCase())) continue;
          if (String(row[c.brandCol] || '').trim()) lastBrand = brand; // update only when explicitly set
          const rawPlat = String(row[c.platCol] || '').trim();
          const job = String(row[c.jobCol] || '').trim();
          const dlVal = row[c.dlCol]; const actVal = row[c.actCol];
          const numJob = Number(row[c.numCol] || 0);
          const linkRaw = String(row[c.linkCol] || '').trim();
          // DEBUG: show raw link for Ant sheet
          if (sheet.name === 'Influencer - Ant' && linkRaw) {
            window._debugLinks = window._debugLinks || [];
            window._debugLinks.push(JSON.stringify(linkRaw.substring(0,200)));
          }
          const links = linkRaw.split(/\n+/).map(l => l.trim()).filter(l => l.startsWith('http'));
          const link = links[0] || '';
          const status = String(row[c.statusCol] || '').trim();
          if (!rawPlat && !job && !links.length && !status) continue;
          rawJobs.push({ brand, rawPlat, job, dlVal, actVal, numJob, links, status });
          if (sheet.name === 'Influencer - Ant') {
            window._debugRaw = window._debugRaw || [];
            window._debugRaw.push(`job="${job.substring(0,20)}" plat="${rawPlat}" links=${links.length} brand="${brand}"`);
          }
        }

        // Status priority order
        const statusPriority = s => {
          const sl = (s||'').toLowerCase();
          if (sl === 'completed' || sl === 'complete' || sl === '✔') return 4;
          if (sl === 'processing') return 3;
          if (sl === 'editing') return 2;
          if (sl === 'cancelled' || sl === 'canceled') return 1;
          return 0;
        };

        // Second pass: group consecutive platform-only rows into the last job row
        const grouped = [];
        let current = null;
        for (const r of rawJobs) {
          if (r.job) {
            current = {
              brand: r.brand,
              platforms: parsePlatforms(r.rawPlat),
              job: r.job,
              deadline: serialToDate(r.dlVal),
              actual: serialToDate(r.actVal),
              numJob: r.numJob,
              links: [...(r.links||[])],
              status: r.status,
            };
            grouped.push(current);
          } else if (current) {
            if (r.rawPlat) {
              parsePlatforms(r.rawPlat).forEach(p => {
                if (!current.platforms.includes(p)) current.platforms.push(p);
              });
            }
            (r.links||[]).forEach(l => { if (!current.links.includes(l)) current.links.push(l); });
            if (statusPriority(r.status) > statusPriority(current.status)) current.status = r.status;
            if (!current.numJob && r.numJob) current.numJob = r.numJob;
            if (!current.deadline && r.dlVal) current.deadline = serialToDate(r.dlVal);
            if (!current.actual && r.actVal) current.actual = serialToDate(r.actVal);
          }
        }

        grouped.forEach(j => jobs.push({ month: MONTHS[mi], brand: j.brand, platforms: j.platforms, job: j.job, deadline: j.deadline, actual: j.actual, numJob: j.numJob, links: j.links, status: j.status }));
      });
    }

    liveData[sheet.name] = { jobs, monthlyTargets };
    document.getElementById('statusDot').className = 'status-dot live';
    document.getElementById('statusLabel').textContent = 'Live — ' + new Date().toLocaleTimeString('th-TH');
    toast('โหลด ' + sheet.name + ' สำเร็จ ✓');
    if (sheet.name === 'Influencer - Ant' && window._debugRaw) {
      const d = document.createElement('div');
      d.style.cssText = 'position:fixed;bottom:10px;right:10px;background:#1e293b;color:#0f0;padding:12px;border-radius:8px;font-size:10px;max-width:500px;max-height:400px;overflow:auto;z-index:9999;font-family:monospace;white-space:pre-wrap;';
      d.innerHTML = '<b>DEBUG RAWJOBS (first 20):</b>\n' + window._debugRaw.slice(0,20).join('\n');
      document.body.appendChild(d);
    }
  } catch(e) {
    document.getElementById('statusDot').className = 'status-dot error';
    document.getElementById('statusLabel').textContent = 'เชื่อมต่อไม่ได้';
    toast('เชื่อมต่อไม่ได้: ' + e.message, 'err');
  } finally {
    document.getElementById('loadingOverlay').style.display = 'none';
    renderAll();
  }
}

function fetchData() {
  fetchPersonData(currentPerson);
}

fetchPersonData(0);

function getMonthlyTargets(personName) {
  if (liveData && liveData[personName]) return liveData[personName].monthlyTargets || {};
  return {};
}

function getPeople() {
  return SHEETS.map(s => s.name);
}

function getJobs(personName) {
  if (liveData && liveData[personName]) return liveData[personName].jobs;
  return [];
}

function renderTabs() {
  const people = getPeople();
  document.getElementById('personTabs').innerHTML = people.map((p,i) =>
    `<div class="person-tab ${i===currentPerson?'active':''}" onclick="switchPerson(${i})">${p}</div>`
  ).join('');

  if (currentPerson === -1) return;

  const name = people[currentPerson];
  const jobs = getJobs(name);
  const months = [...new Set(jobs.map(j => j.month).filter(Boolean))];
  const monthOrder = ['April','May','June','July','August','September','October','November','December'];
  months.sort((a,b) => monthOrder.indexOf(a) - monthOrder.indexOf(b));

  const monthBtns = [`<button class="f-btn ${currentMonth==='ALL'?'active':''}" onclick="filterMonth(this,'ALL')">ทุกเดือน</button>`];
  months.forEach(m => {
    monthBtns.push(`<button class="f-btn ${currentMonth===m?'active':''}" onclick="filterMonth(this,'${m}')">${m}</button>`);
  });
  document.getElementById('monthFilterRow').innerHTML = monthBtns.join('');

  // Re-render brand filter buttons with correct active state
  document.querySelectorAll('.f-btn-brand').forEach(b => {
    const brand = b.getAttribute('onclick').match(/'([^']+)'/)?.[1];
    b.classList.toggle('active', brand === currentBrand);
  });

  // Re-render platform filter buttons with correct active state
  const platDefs = [
    ['ALL','ทั้งหมด'],['SHOPEE','Shopee'],['LAZADA','Lazada'],['TIKTOK','TikTok'],
    ['FACEBOOK','Facebook'],['INSTAGRAM','Instagram'],['LINE','LINE'],['GOOGLE','Google'],
    ['YOUTUBE','YouTube'],['LEMON8','Lemon8'],['LIVE','Live'],['X','X'],
    ['WEBSITE','Website'],['MAINJOB','Main Job'],['OFFLINE','Offline']
  ];
  document.getElementById('filterRow').innerHTML = platDefs.map(([key, label]) =>
    `<button class="f-btn ${currentPlat===key?'active':''}" onclick="filterPlat(this,'${key}')">${label}</button>`
  ).join('');
}

function switchPerson(i) {
  currentPerson = i; currentPlat = 'ALL'; currentMonth = 'ALL'; currentBrand = 'ALL';
  const name = SHEETS[i] ? SHEETS[i].name : null;
  if (name && !liveData[name]) {
    fetchPersonData(i);
  } else {
    renderAll();
  }
}

function filterBrand(el, brand) {
  currentBrand = brand;
  document.querySelectorAll('.f-btn-brand').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderSummary();
  renderTable();
}

function filterMonth(el, month) {
  currentMonth = month;
  document.querySelectorAll('#monthFilterRow .f-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderTable();
  renderBrandGrid();
}

function filterPlat(el, plat) {
  currentPlat = plat;
  document.querySelectorAll('#filterRow .f-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderSummary();
  renderTable();
}

function renderSummary() {
  const name = getPeople()[currentPerson];
  let jobs = getJobs(name);
  const monthlyTargets = getMonthlyTargets(name);
  if (currentMonth !== 'ALL') jobs = jobs.filter(j => j.month === currentMonth);
  if (currentBrand !== 'ALL') jobs = jobs.filter(j => j.brand === currentBrand);
  if (currentPlat !== 'ALL') jobs = jobs.filter(j => j.platforms && j.platforms.includes(currentPlat));

  const totalActual = jobs.reduce((s,j) => s+(j.numJob||0), 0);

  // เป้าหมายรายเดือนจาก Sheet จริง
  let totalTarget;
  if (currentMonth !== 'ALL') {
    totalTarget = monthlyTargets[currentMonth] || BRAND_TARGET[currentBrand] || Object.values(BRAND_TARGET).reduce((a,b)=>a+b,0);
  } else {
    totalTarget = Object.values(monthlyTargets).reduce((a,b)=>a+b,0) || Object.values(BRAND_TARGET).reduce((a,b)=>a+b,0);
  }
  const done = jobs.filter(j => isDone(j.status)).length;
  const pct = totalTarget > 0 ? Math.round(totalActual/totalTarget*100) : 0;
  const monthLabel = currentMonth === 'ALL' ? 'ทุกเดือน' : currentMonth;

  document.getElementById('summaryBar').innerHTML = `
    <div><div style="font-size:11px;color:#888;margin-bottom:2px">ชื่อ <span style="font-size:10px;background:#dcfce7;color:#166534;padding:2px 8px;border-radius:8px;font-weight:600">● LIVE</span></div>
    <div style="font-size:17px;font-weight:700">${name}</div></div>
    <div style="width:1px;height:50px;background:#e9eef5"></div>
    <div><div class="metric-label">เดือน</div><div style="font-size:16px;font-weight:700;color:#185FA5">${monthLabel}</div></div>
    <div style="width:1px;height:50px;background:#e9eef5"></div>
    <div><div class="metric-label">Actual รวม</div><div style="font-size:28px;font-weight:700;color:#185FA5">${totalActual}</div></div>
    <div><div class="metric-label">เป้าหมายรวม</div><div style="font-size:28px;font-weight:700;color:#444">${totalTarget}</div></div>
    <div><div class="metric-label">เสร็จแล้ว</div><div style="font-size:28px;font-weight:700;color:#059669">${done}</div></div>
    <div><div class="metric-label">ยังไม่เสร็จ</div><div style="font-size:28px;font-weight:700;color:#d97706">${jobs.length-done}</div></div>
    <div style="flex:1;min-width:140px">
      <div class="metric-label" style="margin-bottom:6px">Overall Progress — ${pct}%</div>
      <div class="overall-bar-bg"><div class="overall-bar" style="width:${Math.min(pct,100)}%"></div></div>
    </div>`;
}

function renderBrandGrid() {
  const name = getPeople()[currentPerson];
  let jobs = getJobs(name);
  if (currentMonth !== 'ALL') jobs = jobs.filter(j => j.month === currentMonth);

  document.getElementById('brandGrid').innerHTML = BRANDS.map(b => {
    const bj = jobs.filter(j => j.brand === b);
    const actual = bj.reduce((s,j) => s+(j.numJob||0), 0);
    const target = BRAND_TARGET[b];
    const pct = target > 0 ? Math.round(actual/target*100) : 0;
    const platRows = ['SHOPEE','LAZADA','TIKTOK','FACEBOOK','INSTAGRAM','LINE','GOOGLE','YOUTUBE','LEMON8','LIVE','X','WEBSITE','MAINJOB','OFFLINE'].map(plat => {
      const pj = bj.filter(j => j.platforms && j.platforms.includes(plat));
      if (pj.length === 0) return '';
      const done = pj.filter(j => isDone(j.status)).length;
      const total = pj.length;
      const pp = total > 0 ? Math.round(done/total*100) : 0;
      return `<div class="plat-row">
        <span class="plat-label ${PLAT_COLOR_CLASS[plat]||''}" style="font-size:10px">${plat}</span>
        <div class="plat-bar-bg"><div class="plat-bar ${PLAT_BAR[plat]||''}" style="width:${pp}%"></div></div>
        <span class="plat-count">${done}/${total}</span></div>`;
    }).join('');
    return `<div class="brand-card">
      <div class="brand-header">
        <span class="brand-badge ${BRAND_BADGE[b]}">${b}</span>
        <div class="brand-nums"><div class="brand-actual" style="color:${BRAND_COLOR[b]}">${actual}</div>
        <div class="brand-target">เป้า ${target} &nbsp; ${pct}%</div></div>
      </div>
      <div class="big-bar-bg"><div class="big-bar" style="width:${Math.min(pct,100)}%;background:${BRAND_COLOR[b]}"></div></div>
      ${platRows}</div>`;
  }).join('');
}

function renderTable() {
  const name = getPeople()[currentPerson];
  let jobs = getJobs(name);
  if (currentMonth !== 'ALL') jobs = jobs.filter(j => j.month === currentMonth);
  if (currentBrand !== 'ALL') jobs = jobs.filter(j => j.brand === currentBrand);
  if (currentPlat !== 'ALL') jobs = jobs.filter(j => j.platforms && j.platforms.includes(currentPlat));
  if (!jobs.length) {
    document.getElementById('jobBody').innerHTML = `<tr><td colspan="9" class="no-data">ไม่พบรายการ</td></tr>`;
    return;
  }
  document.getElementById('jobBody').innerHTML = jobs.map((j,i) => {
    const done = isDone(j.status);
    const dlStr = fmtDate(j.deadline);
    const actStr = fmtDate(j.actual);
    let actColor = '#555';
    if (j.actual && j.deadline) {
      actColor = j.actual <= j.deadline ? '#059669' : '#d97706';
    }
    const platPills = (j.platforms || []).map(p =>
      `<span class="plat-pill ${PLAT_PILL[p]||'pill-offline'}" style="margin-right:3px">${p}</span>`
    ).join('');
    const links = j.links && j.links.length ? j.links : (j.link ? [j.link] : []);
    const linkBtn = links.length
      ? links.map((url, i) => `<a href="${url}" target="_blank" style="display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:8px;background:#f0f7ff;color:#185FA5;font-size:11px;font-weight:600;text-decoration:none;border:1px solid #bfdbfe;margin-bottom:3px">🔗 ดูงาน${links.length > 1 ? ' '+(i+1) : ''}</a>`).join('<br>')
      : '<span style="color:#ccc;font-size:11px">-</span>';
    return `<tr>
      <td style="color:#aaa;font-size:12px">${i+1}</td>
      <td><span class="brand-pill ${BRAND_BADGE[j.brand]||''}">${j.brand}</span></td>
      <td>${platPills}</td>
      <td>${j.job}</td>
      <td class="num-job">${j.numJob}</td>
      <td style="font-size:12px;color:#555;white-space:nowrap">${dlStr}</td>
      <td style="font-size:12px;white-space:nowrap;color:${actColor}">${actStr}</td>
      <td>${linkBtn}</td>
      <td>${statusPill(j.status)}</td>
    </tr>`;
  }).join('');
}

function renderTeamOverview() {
  const people = getPeople();
  const loadedPeople = people.filter(name => liveData[name]);
  const monthOrder = ['April','May','June','July','August','September','October','November','December'];

  const monthBtns = [`<button class="f-btn ${currentMonth==='ALL'?'active':''}" onclick="filterTeamMonth(this,'ALL')">ทุกเดือน</button>`];
  monthOrder.forEach(m => {
    monthBtns.push(`<button class="f-btn ${currentMonth===m?'active':''}" onclick="filterTeamMonth(this,'${m}')">${m}</button>`);
  });

  if (loadedPeople.length === 0) {
    document.getElementById('mainSection').innerHTML = `
      <div style="text-align:center;padding:60px;color:#aaa">
        <div style="font-size:40px;margin-bottom:16px">👆</div>
        <div style="font-size:16px;font-weight:600;margin-bottom:8px">ยังไม่มีข้อมูล</div>
        <div style="font-size:13px">กดแท็บชื่อคนด้านบนเพื่อโหลดข้อมูลก่อนครับ</div>
      </div>`;
    return;
  }

  const rows = loadedPeople.map(name => {
    let jobs = getJobs(name);
    const monthlyTargets = getMonthlyTargets(name);
    if (currentMonth !== 'ALL') jobs = jobs.filter(j => j.month === currentMonth);
    const actual = jobs.reduce((s,j) => s+(j.numJob||0), 0);
    const target = currentMonth !== 'ALL'
      ? (monthlyTargets[currentMonth] || 0)
      : Object.values(monthlyTargets).reduce((a,b)=>a+b,0) || Object.values(BRAND_TARGET).reduce((a,b)=>a+b,0);
    const done = jobs.filter(j => isDone(j.status)).length;
    const notDone = jobs.length - done;
    const pct = target > 0 ? Math.round(actual/target*100) : 0;
    const barColor = pct >= 100 ? '#059669' : pct >= 70 ? '#185FA5' : '#d97706';
    return `<tr>
      <td style="font-weight:600;font-size:14px">${name}</td>
      <td style="text-align:center;font-size:18px;font-weight:700;color:#185FA5">${actual}</td>
      <td style="text-align:center;font-size:18px;font-weight:700;color:#444">${target}</td>
      <td style="text-align:center;font-size:18px;font-weight:700;color:#059669">${done}</td>
      <td style="text-align:center;font-size:18px;font-weight:700;color:#d97706">${notDone}</td>
      <td style="min-width:160px">
        <div style="display:flex;align-items:center;gap:8px">
          <div style="flex:1;height:8px;background:#f1f5f9;border-radius:4px;overflow:hidden">
            <div style="width:${Math.min(pct,100)}%;height:100%;background:${barColor};border-radius:4px"></div>
          </div>
          <span style="font-size:12px;font-weight:700;color:${barColor};min-width:36px">${pct}%</span>
        </div>
      </td>
    </tr>`;
  }).join('');

  let allJobs = loadedPeople.flatMap(n => {
    let j = getJobs(n);
    if (currentMonth !== 'ALL') j = j.filter(jj => jj.month === currentMonth);
    return j;
  });
  const totalActual = allJobs.reduce((s,j) => s+(j.numJob||0), 0);
  const totalDone = allJobs.filter(j => isDone(j.status)).length;
  const totalNotDone = allJobs.length - totalDone;
  const notLoaded = people.length - loadedPeople.length;

  document.getElementById('mainSection').innerHTML = `
    <div class="summary-bar" style="margin-bottom:16px">
      <div><div class="metric-label">เดือน</div><div style="font-size:16px;font-weight:700;color:#185FA5">${currentMonth==='ALL'?'ทุกเดือน':currentMonth}</div></div>
      <div style="width:1px;height:50px;background:#e9eef5"></div>
      <div><div class="metric-label">Actual รวม (${loadedPeople.length} คน)</div><div style="font-size:28px;font-weight:700;color:#185FA5">${totalActual}</div></div>
      <div><div class="metric-label">เสร็จแล้ว</div><div style="font-size:28px;font-weight:700;color:#059669">${totalDone}</div></div>
      <div><div class="metric-label">ยังไม่เสร็จ</div><div style="font-size:28px;font-weight:700;color:#d97706">${totalNotDone}</div></div>
      ${notLoaded > 0 ? `<div style="font-size:11px;color:#aaa;align-self:center">⚠️ ยังไม่โหลด ${notLoaded} คน<br>กดแท็บชื่อเพื่อโหลด</div>` : ''}
    </div>
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px">
      <div class="section-head" style="margin:0">เลือกเดือน:</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">${monthBtns.join('')}</div>
    </div>
    <div class="section-head">ผลรวมรายคน</div>
    <div class="table-wrap" style="margin-top:12px">
      <table>
        <thead><tr>
          <th>ชื่อ</th>
          <th style="text-align:center">Actual</th>
          <th style="text-align:center">เป้าหมาย</th>
          <th style="text-align:center">เสร็จแล้ว</th>
          <th style="text-align:center">ยังไม่เสร็จ</th>
          <th>Progress</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}



function filterTeamMonth(el, month) {
  currentMonth = month;
  renderTeamOverview();
}

function renderAll() {
  renderTabs();
  document.getElementById('mainSection').innerHTML = '';
  document.getElementById('summaryBar').style.display = 'flex';
  document.getElementById('brandGridWrap').style.display = 'block';
  document.getElementById('tableWrap').style.display = 'block';
  renderSummary();
  renderBrandGrid();
  renderTable();
}

</script>
